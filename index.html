<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çaydanlık AI - Kusursuz Tuzak</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body, html {
            height: 100vh;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- ÜST BAR VE İNDİR BUTONU --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #1a1a1a;
            border-bottom: 2px solid #ff9500;
            flex-shrink: 0;
            z-index: 10;
        }
        .header h1 { font-size: 1.4rem; color: #ff9500; letter-spacing: 2px; font-weight: bold; }
        
        .download-btn {
            background-color: #ff9500;
            color: black;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .download-btn:hover { background-color: #e68600; transform: scale(1.05); }

        /* --- SOHBET ALANI --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user { align-self: flex-end; background-color: #ff9500; color: black; border-bottom-right-radius: 2px; }
        .message.bot { align-self: flex-start; background-color: #262626; color: white; border: 1px solid #333; border-bottom-left-radius: 2px; }
        
        /* SPAM MESAJI (Kırmızı ve Titreyen) */
        .message.spam { 
            background-color: #8b0000; 
            color: white; 
            font-weight: bold; 
            animation: shake 0.2s infinite; 
            align-self: center;
            width: 100%;
            text-align: center;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            50% { transform: translateX(2px); }
            75% { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }

        /* --- ALT GİRİŞ ALANI (FOTOĞRAF BUTONU EKLENDİ) --- */
        .input-area {
            background-color: #ffffff;
            padding: 12px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            z-index: 10;
        }
        
        /* Tuzaklı Fotoğraf Butonu */
        .photo-btn {
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 0 15px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-btn:hover { background-color: #ddd; }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            color: #000;
        }
        .input-area button.send-btn {
            background-color: #ff9500;
            color: black;
            border: none;
            border-radius: 12px;
            padding: 0 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- SİNİR BOZUCU REKLAM POPUP'I --- */
        .ad-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .ad-content {
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            border: 4px solid red;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-ad {
            position: absolute;
            top: -10px; right: -10px;
            background: white;
            border: 3px solid red;
            border-radius: 50%;
            width: 35px; height: 35px;
            font-size: 20px;
            font-weight: bold;
            color: red;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .ad-content h2 { color: red; margin-bottom: 10px; text-transform: uppercase; }
        
        .ad-video {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            pointer-events: none; /* Videoya tıklarsa reklamın arkasına tıklandı saysın diye */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ÇAYDANLIK AI</h1>
        <a href="https://budeogretmenimsenicokseviyorum.my.canva.site/n-tr-modern-web-sitesi-yenileme-hikayeniz" target="_blank" class="download-btn">Windows İçin İndir</a>
    </div>

    <div class="chat-container" id="chatArea">
        <div class="message bot">Sorularını bekliyorum. Belki fotoğraf falan da eklemek istersin? 😉</div>
    </div>

    <div class="input-area">
        <!-- İŞTE TUZAK BURADA! FOTOĞRAF BUTONU -->
        <button class="photo-btn" id="photoBtn" title="Fotoğraf Ekle">📷</button>
        <input type="text" id="userInput" placeholder="Bir şey yaz..." autocomplete="off">
        <button class="send-btn" id="sendBtn">GÖNDER</button>
    </div>

    <!-- REKLAM MODALI -->
    <div class="ad-modal" id="adModal">
        <div class="ad-content">
            <div class="close-ad" id="closeAd">&times;</div>
            <h2>🔥 DİKKAT! FIRSAT! 🔥</h2>
            <p style="margin-bottom: 10px; font-weight: bold;">En parlak kel kafalar yarışması başlıyor!</p>
            
            <!-- VİDEO: autoplay veya muted yazmadım, butona basınca JS ile açılacak! -->
            <video id="adVideo" class="ad-video" src="video.mp4" loop playsinline></video>
            
            <p style="font-size: 14px;">Hemen katıl ve parlamaya başla!</p>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const photoBtn = document.getElementById('photoBtn');
        const adModal = document.getElementById('adModal');
        const closeAd = document.getElementById('closeAd');
        const adVideo = document.getElementById('adVideo');

        // BOT CEVAP LİSTELERİ
        const konular = ["patates", "muz", "tavuk", "uzaylı", "pizza", "kaplumbağa", "kedi", "çorap"];
        const eylemler = ["neden düşünür", "neden yuvarlanır", "neden konuşmaz", "neden kayar", "neden uçmaz"];
        const cevaplar = ["Bilim bunu açıklayamadı", "Muhtemelen uzaylılar yaptı", "Çünkü evren öyle istedi", "Bu tamamen patates teorisi"];

        function rastgeleSec(liste) { return liste[Math.floor(Math.random() * liste.length)]; }

        // MESAJ GÖNDERME MANTIĞI
        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.textContent = text;
            chatArea.appendChild(uDiv);
            userInput.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;

            // Bot 1.5 saniye bilerek bekletiyor
            setTimeout(() => {
                const bDiv = document.createElement('div');
                bDiv.className = 'message bot';
                const k = rastgeleSec(konular);
                const e = rastgeleSec(eylemler);
                const c = rastgeleSec(cevaplar);
                bDiv.textContent = `${k.charAt(0).toUpperCase() + k.slice(1)} ${e}? ${c}.`;
                chatArea.appendChild(bDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 1500);
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

        // --- FOTOĞRAF TUZAĞI (BUTONA BASINCA VİDEO SESLİ AÇILIR) ---
        photoBtn.onclick = () => {
            adModal.style.display = 'flex';
            // Kullanıcı butona tıkladığı için tarayıcı sesli videoya izin verir!
            adVideo.play().catch(e => console.log("Video başlatılamadı:", e));
        };

        // --- REKLAM KAPATMA VE SPAM KAOSU ---
        adModal.addEventListener('click', function(e) {
            if (e.target === closeAd) {
                // SADECE çarpıya basarsa güvenli kapanır ve video durur
                adModal.style.display = 'none';
                adVideo.pause();
                adVideo.currentTime = 0;
            } else {
                // Çarpı dışı herhangi bir yere tıklarsa KAOS başlar
                adModal.style.display = 'none';
                adVideo.pause();
                baslatKaos();
            }
        });

        function baslatKaos() {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'message spam';
            alertDiv.textContent = "SEN MİSİN REKLAMI GEÇMEYE ÇALIŞAN?! SİSTEM ÇÖKÜYOR!!!";
            chatArea.appendChild(alertDiv);

            let spamCount = 0;
            const spamInterval = setInterval(() => {
                if(spamCount >= 100) {
                    clearInterval(spamInterval);
                    return;
                }
                const sDiv = document.createElement('div');
                sDiv.className = 'message spam';
                sDiv.textContent = "HATA! " + rastgeleSec(konular).toUpperCase() + " " + rastgeleSec(cevaplar).toUpperCase() + "!!!";
                chatArea.appendChild(sDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
                spamCount++;
            }, 50); // Saniyede 20 mesaj
        }
    </script>
</body>
</html>
