<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çaydanlık AI - Kaos Sürümü</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body, html {
            height: 100vh;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- ÜST BAR VE İNDİR BUTONU --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #1a1a1a;
            border-bottom: 2px solid #ff9500;
            flex-shrink: 0;
            z-index: 10;
        }
        .header h1 { font-size: 1.4rem; color: #ff9500; letter-spacing: 2px; font-weight: bold; }
        
        .download-btn {
            background-color: #ff9500;
            color: black;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .download-btn:hover { background-color: #e68600; transform: scale(1.05); }

        /* --- SOHBET ALANI --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.user { align-self: flex-end; background-color: #ff9500; color: black; border-bottom-right-radius: 2px; }
        .message.bot { align-self: flex-start; background-color: #262626; color: white; border-bottom-left-radius: 2px; }
        .message.spam { background-color: #8b0000; color: white; font-weight: bold; font-size: 14px; animation: shake 0.2s infinite; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            50% { transform: translateX(2px); }
            75% { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }

        /* --- ALT GİRİŞ ALANI --- */
        .input-area {
            background-color: #ffffff;
            padding: 12px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            z-index: 10;
        }
        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            color: #000;
        }
        .input-area button {
            background-color: #ff9500;
            color: black;
            border: none;
            border-radius: 8px;
            padding: 0 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- SİNİR BOZUCU REKLAM POPUP'I --- */
        .ad-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .ad-content {
            background: #fff;
            color: #000;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            position: relative;
            border: 5px solid red;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-ad {
            position: absolute;
            top: 5px; right: 10px;
            font-size: 24px;
            font-weight: bold;
            color: red;
            cursor: pointer;
        }
        .ad-content h2 { color: red; margin-bottom: 10px; text-transform: uppercase; }
        .ad-content p { font-size: 18px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ÇAYDANLIK AI</h1>
        <a href="https://budeogretmenimsenicokseviyorum.my.canva.site/dahopg7lol0">Windows İçin İndir</a>
    </div>

    <div class="chat-container" id="chatArea">
        <div class="message bot">Sistem hazır. Sana çok geç ve uyduruk cevaplar vereceğim. Ne istersin?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Yaz bakalım..." autocomplete="off">
        <button id="sendBtn">GÖNDER</button>
    </div>

    <div class="ad-modal" id="adModal">
        <div class="ad-content">
            <span class="close-ad" id="closeAd">&times;</span>
            <h2>🔥 DİKKAT! FIRSAT! 🔥</h2>
            <p id="adText">En parlak kel kafalar yarışması başlıyor! Hemen katıl ve parlamaya başla!</p>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const adModal = document.getElementById('adModal');
        const closeAd = document.getElementById('closeAd');
        const adText = document.getElementById('adText');

        // BOT CEVAP LİSTELERİ
        const konular = ["patates", "muz", "tavuk", "uzaylı", "pizza", "kaplumbağa", "kedi", "çorap", "masa", "robot", "karpuz"];
        const eylemler = ["neden düşünür", "neden yuvarlanır", "neden konuşmaz", "neden kayar", "neden uçmaz", "neden dans eder"];
        const cevaplar = ["Bilim bunu açıklayamadı", "Muhtemelen uzaylılar yaptı", "Çünkü evren öyle istedi", "Bu tamamen patates teorisi", "Bu çok karmaşık bir konu"];

        // REKLAM METİNLERİ
        const reklamlar = [
            "En parlak kel kafalar yarışması başlıyor! Şampiyona sürpriz ödül!",
            "Satılık 2. el UFO! Sadece 2 kere Mars'a gidip geldi. Kaçırma!",
            "Çorap teki bulma dedektiflik bürosu! Hemen tıkla!",
            "Uçan halı periyodik bakımı yapılır. %50 İndirim!",
            "Uzaylılar için tasarlanmış yanmaz yapışmaz çaydanlıklar stokta!"
        ];

        function rastgeleSec(liste) { return liste[Math.floor(Math.random() * liste.length)]; }

        // NORMAL MESAJLAŞMA SİSTEMİ
        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // Kullanıcı mesajını ekle
            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.textContent = text;
            chatArea.appendChild(uDiv);
            userInput.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;

            // Botun bilerek GEÇ cevap vermesi (1.5 saniye / 1500ms bekletiyor)
            setTimeout(() => {
                const bDiv = document.createElement('div');
                bDiv.className = 'message bot';
                const k = rastgeleSec(konular);
                const e = rastgeleSec(eylemler);
                const c = rastgeleSec(cevaplar);
                bDiv.textContent = `${k.charAt(0).toUpperCase() + k.slice(1)} ${e}? ${c}.`;
                chatArea.appendChild(bDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 1500);
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

        // --- REKLAM SİSTEMİ ---
        // Her 20 saniyede bir rastgele sinir bozucu reklam çıkar
        setInterval(() => {
            if (adModal.style.display !== 'flex') {
                adText.textContent = rastgeleSec(reklamlar);
                adModal.style.display = 'flex';
            }
        }, 20000); 

        // --- ÇARPIYA (X) BASINCA OLACAK KAOS (ON MİLYON YAZI SPAMI) ---
        closeAd.onclick = () => {
            adModal.style.display = 'none'; // Reklamı kapat
            
            // Kullanıcıya ilk şoku ver
            const alertDiv = document.createElement('div');
            alertDiv.className = 'message spam';
            alertDiv.textContent = "SEN MİSİN REKLAMI KAPATAN?! SİSTEM ÇÖKÜYOR!!!";
            chatArea.appendChild(alertDiv);

            // 100 tane rastgele mesajı anında ekrana fırlatıp chat'i patlat
            let spamCount = 0;
            const spamInterval = setInterval(() => {
                if(spamCount >= 100) {
                    clearInterval(spamInterval);
                    return;
                }
                const sDiv = document.createElement('div');
                sDiv.className = 'message spam';
                sDiv.textContent = "BZZT! HATA! " + rastgeleSec(konular).toUpperCase() + " " + rastgeleSec(cevaplar).toUpperCase() + "!!!";
                chatArea.appendChild(sDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
                spamCount++;
            }, 50); // Her 50 milisaniyede bir yazdırır
        };
    </script>
</body>
</html>
