<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çaydanlık AI - Siber Kaos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        
        body, html {
            height: 100vh;
            background-color: #050505; /* Çok koyu siber siyah */
            color: #00ffcc; /* Neon camgöbeği yazılar */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- SİBER ÜST BAR --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background: linear-gradient(90deg, #111, #222);
            border-bottom: 2px solid #ff3300; /* Neon turuncu/kırmızı */
            box-shadow: 0 0 15px rgba(255, 51, 0, 0.4);
            z-index: 10;
        }
        .header h1 { font-size: 1.5rem; color: #ff3300; letter-spacing: 4px; text-shadow: 0 0 5px #ff3300; }
        
        .download-btn {
            background-color: #00ffcc;
            color: #000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 3px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 10px #00ffcc;
            transition: 0.1s;
        }
        .download-btn:hover { background-color: #fff; box-shadow: 0 0 20px #fff; }

        /* --- SOHBET ALANI --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: repeating-linear-gradient(0deg, rgba(0,255,204,0.03) 0px, rgba(0,255,204,0.03) 1px, transparent 1px, transparent 2px);
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 5px;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            border-left: 4px solid transparent;
        }
        .message.user { align-self: flex-end; background-color: rgba(0, 255, 204, 0.1); color: #00ffcc; border-right: 4px solid #00ffcc; border-left: none; }
        .message.bot { align-self: flex-start; background-color: rgba(255, 51, 0, 0.1); color: #ff3300; border-left: 4px solid #ff3300; }
        
        /* SPAM EFEKTİ */
        .message.spam { 
            background-color: #ff0000; 
            color: white; 
            font-weight: bold; 
            font-size: 18px; 
            border: none;
            align-self: center;
            width: 100%;
            text-align: center;
            animation: glitch 0.1s infinite; 
        }

        @keyframes glitch {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        /* --- ALT GİRİŞ ALANI --- */
        .input-area {
            background-color: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }
        .input-area input {
            flex: 1;
            padding: 15px;
            background-color: #000;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-size: 16px;
            outline: none;
        }
        .input-area input::placeholder { color: #005544; }
        .input-area button {
            background-color: #ff3300;
            color: #fff;
            border: none;
            padding: 0 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px #fff;
        }

        /* --- TUZAKLI REKLAM POPUP'I --- */
        .ad-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); /* Siyah arka plan (Buna tıklarsa da yanar) */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .ad-content {
            background: #000;
            color: #fff;
            padding: 20px;
            border: 2px solid #ff3300;
            box-shadow: 0 0 30px #ff3300;
            text-align: center;
            max-width: 500px;
            position: relative;
        }
        
        /* Kurtuluş Çarpısı */
        .close-ad {
            position: absolute;
            top: -15px; right: -15px;
            background: #000;
            border: 2px solid #ff3300;
            border-radius: 50%;
            width: 40px; height: 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ff3300;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }
        .close-ad:hover { background: #ff3300; color: #000; }

        .ad-content h2 { color: #ff3300; margin-bottom: 15px; font-family: sans-serif; }
        
        /* Video Stili */
        .ad-video {
            width: 100%;
            border: 1px solid #444;
            margin-bottom: 10px;
            pointer-events: none; /* Videonun kendi oynatıcı tuşlarına basılmasını engeller */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ÇAYDANLIK AI</h1>
        <a href="https://budeogretmenimsenicokseviyorum.my.canva.site/n-tr-modern-web-sitesi-yenileme-hikayeniz" target="_blank" class="download-btn">WINDOWS .EXE İNDİR</a>
    </div>

    <div class="chat-container" id="chatArea">
        <div class="message bot">> SİSTEM BAŞLATILDI...<br>> ÇAYDANLIK AI AKTİF.<br>> SORULARINI YAZ, GEÇ VE SAÇMA CEVAPLAR AL.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="> Komut veya soru girin..." autocomplete="off">
        <button id="sendBtn">YÜRÜT</button>
    </div>

    <div class="ad-modal" id="adModal">
        <div class="ad-content">
            <div class="close-ad" id="closeAd">&times;</div>
            
            <h2>🔥 DİKKAT! FIRSAT! 🔥</h2>
            <p style="margin-bottom: 10px;">En parlak kel kafalar yarışması başlıyor!</p>
            
            <video class="ad-video" src="video.mp4" autoplay loop muted playsinline></video>
            
            <p style="color: #00ffcc; font-size: 12px;">Hemen tıklayın ve şampiyonluğa ulaşın!</p>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const adModal = document.getElementById('adModal');
        const closeAd = document.getElementById('closeAd');

        // BOT LİSTELERİ
        const konular = ["PATATES", "MUZ", "TAVUK", "UZAYLI", "PİZZA", "ROBOT", "ÇORAP", "KEL KAFA"];
        const eylemler = ["NEDEN YUVARLANIR", "NEDEN KOD YAZAMAZ", "NEDEN UÇMAZ", "NEDEN ÇAY İÇER", "NEDEN ÇÖKER"];
        const cevaplar = ["SİSTEM BUNU ÇÖZEMEDİ", "KESİNLİKLE UZAYLILAR", "ÇÜNKÜ VERCEL HATA VERDİ", "BUNU GOOGLE BİLE BİLMİYOR"];

        function rastgeleSec(liste) { return liste[Math.floor(Math.random() * liste.length)]; }

        // SOHBET SİSTEMİ
        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            const uDiv = document.createElement('div');
            uDiv.className = 'message user';
            uDiv.textContent = "> " + text.toUpperCase();
            chatArea.appendChild(uDiv);
            userInput.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;

            // 1.5 saniye bilerek bekletiyor
            setTimeout(() => {
                const bDiv = document.createElement('div');
                bDiv.className = 'message bot';
                bDiv.textContent = "> HESAPLANIYOR...\n> " + rastgeleSec(konular) + " " + rastgeleSec(eylemler) + "? " + rastgeleSec(cevaplar) + ".";
                chatArea.appendChild(bDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 1500);
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

        // --- REKLAM GÖSTERİMİ (15 Saniyede Bir) ---
        setInterval(() => {
            if (adModal.style.display !== 'flex') {
                adModal.style.display = 'flex';
            }
        }, 15000); 

        // --- BÜYÜK TUZAK MANTIĞI ---
        adModal.addEventListener('click', function(e) {
            // Eğer tam olarak "closeAd" (Çarpı) elementine tıkladıysa:
            if (e.target === closeAd) {
                adModal.style.display = 'none'; // Güvenli kapanış.
            } 
            // Çarpı DIŞINDA HERHANGİ BİR YERE tıkladıysa (videoya, siyaha, yazıya):
            else {
                adModal.style.display = 'none'; // Reklamı çek...
                baslatKaos(); // KAOSU BAŞLAT!
            }
        });

        // SPAM YAĞMURU FONKSİYONU
        function baslatKaos() {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'message spam';
            alertDiv.textContent = "!!! YANLIŞ YERE TIKLADIN !!! SİSTEM ÇÖKÜYOR !!!";
            chatArea.appendChild(alertDiv);

            let spamCount = 0;
            const spamInterval = setInterval(() => {
                if(spamCount >= 150) {
                    clearInterval(spamInterval); // 150 mesajdan sonra durur (tarayıcı tamamen çökmesin diye)
                    return;
                }
                const sDiv = document.createElement('div');
                sDiv.className = 'message spam';
                sDiv.textContent = "FATAL ERROR! " + rastgeleSec(konular) + " SİSTEMİ ELE GEÇİRDİ! " + rastgeleSec(cevaplar) + "!!!";
                chatArea.appendChild(sDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
                spamCount++;
            }, 40); // Saniyede tonlarca mesaj atar
        }
    </script>
</body>
</html>
